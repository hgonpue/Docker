name: Strix Check

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: strix-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: false
          comment-summary-in-pr: always

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep

      - name: Run Semgrep
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --sarif \
            --output reports/semgrep.sarif \
            .

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/semgrep.sarif

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  strix-check:
    name: strix-check
    if: always()
    runs-on: ubuntu-latest
    needs:
      - dependency-review
      - gitleaks
      - semgrep
      - trivy
    steps:
      - name: Evaluate gate
        shell: bash
        run: |
          echo "dependency-review=${{ needs.dependency-review.result }}"
          echo "gitleaks=${{ needs.gitleaks.result }}"
          echo "semgrep=${{ needs.semgrep.result }}"
          echo "trivy=${{ needs.trivy.result }}"

          FAIL=0

          for result in \
            "${{ needs.dependency-review.result }}" \
            "${{ needs.gitleaks.result }}" \
            "${{ needs.semgrep.result }}" \
            "${{ needs.trivy.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo "Strix Check failed: rejecting."
            exit 1
          fi

          echo "Strix Check passed: allowing."
